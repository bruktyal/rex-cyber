name: Publish Rex IoT Package to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag, e.g., v0.1.0

jobs:
  build-n-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest

    permissions:
      # CRITICAL: This permission is required for PyPI Trusted Publishing (OIDC)
      id-token: write
      contents: read

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: python -m pip install --upgrade pip build

    - name: Build Package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
